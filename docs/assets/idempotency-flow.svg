<svg width="1120" height="370" viewBox="0 0 1120 370" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1120" height="370" rx="28" fill="#F6F8FB"/>
  <rect x="36" y="32" width="1048" height="306" rx="22" fill="#FFFFFF" stroke="#D9E2EC"/>
  <text x="70" y="76" fill="#172033" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="26" font-weight="700">订单幂等提交流程</text>
  <text x="70" y="108" fill="#667085" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="15">同一用户携带相同 requestId 重复下单时，系统返回原订单，不重复扣减库存</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2L10 6L2 10" fill="none" stroke="#116149" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="red-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2L10 6L2 10" fill="none" stroke="#B42318" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#172033" flood-opacity="0.08"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="70" y="150" width="170" height="108" rx="14" fill="#EEF4FF" stroke="#C7D7FE"/>
    <circle cx="106" cy="181" r="15" fill="#3B82F6"/>
    <path d="M99 181h14M106 174v14" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
    <text x="98" y="216" fill="#172033" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="700">前端购票</text>
    <text x="98" y="239" fill="#667085" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13">生成 requestId</text>
  </g>

  <path d="M250 204H320" stroke="#116149" stroke-width="2.4" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="332" y="150" width="190" height="108" rx="14" fill="#FFF8E6" stroke="#F1D38A"/>
    <rect x="368" y="173" width="52" height="38" rx="8" fill="#F2C94C"/>
    <path d="M379 192h30M379 202h20" stroke="#183B56" stroke-width="2" stroke-linecap="round"/>
    <text x="368" y="216" fill="#172033" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="700">查询幂等键</text>
    <text x="368" y="239" fill="#667085" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13">userId + requestId</text>
  </g>

  <path d="M532 176H604" stroke="#B42318" stroke-width="2.4" stroke-dasharray="7 7" marker-end="url(#red-arrow)"/>
  <text x="552" y="160" fill="#B42318" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13">exists</text>
  <path d="M532 232H604" stroke="#116149" stroke-width="2.4" marker-end="url(#arrow)"/>
  <text x="550" y="256" fill="#116149" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13">new</text>

  <g filter="url(#shadow)">
    <rect x="616" y="122" width="178" height="82" rx="14" fill="#FDF2F2" stroke="#F8C7C7"/>
    <circle cx="652" cy="154" r="14" fill="#B42318"/>
    <path d="M646 148l12 12M658 148l-12 12" stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round"/>
    <text x="676" y="157" fill="#172033" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="17" font-weight="700">返回原订单</text>
    <text x="676" y="180" fill="#667085" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13">无副作用</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="616" y="224" width="178" height="82" rx="14" fill="#F0F7F4" stroke="#B8DCCF"/>
    <circle cx="652" cy="256" r="14" fill="#116149"/>
    <path d="M645 256l5 5l11-13" stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="676" y="258" fill="#172033" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="17" font-weight="700">扣库存下单</text>
    <text x="676" y="281" fill="#667085" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13">保存 requestId</text>
  </g>

  <path d="M804 265H872" stroke="#116149" stroke-width="2.4" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="884" y="224" width="170" height="82" rx="14" fill="#EEF4FF" stroke="#C7D7FE"/>
    <ellipse cx="922" cy="250" rx="27" ry="10" fill="#3B82F6"/>
    <path d="M895 250v29c0 6 12 10 27 10s27-4 27-10v-29" fill="#3B82F6"/>
    <path d="M895 265c0 6 12 10 27 10s27-4 27-10" stroke="#FFFFFF" stroke-width="2"/>
    <text x="948" y="259" fill="#172033" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="17" font-weight="700">唯一约束</text>
    <text x="948" y="282" fill="#667085" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13">防重复写入</text>
  </g>

  <rect x="70" y="315" width="984" height="22" rx="11" fill="#F0F3F7"/>
  <circle cx="142" cy="326" r="5" fill="#3B82F6"/>
  <text x="156" y="331" fill="#485467" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13">重复请求可安全重放</text>
  <circle cx="374" cy="326" r="5" fill="#116149"/>
  <text x="388" y="331" fill="#485467" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13">首次请求正常扣库存</text>
  <circle cx="602" cy="326" r="5" fill="#B42318"/>
  <text x="616" y="331" fill="#485467" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13">重复请求不重复扣库存、不重复写日志、不重复触发风控</text>
</svg>
