<svg width="1120" height="390" viewBox="0 0 1120 390" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1120" height="390" rx="28" fill="#F6F8FB"/>
  <rect x="36" y="32" width="1048" height="326" rx="22" fill="#FFFFFF" stroke="#D9E2EC"/>
  <text x="70" y="76" fill="#172033" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="26" font-weight="700">车次余票查询缓存流程</text>
  <text x="70" y="108" fill="#667085" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="15">高频查询优先读取缓存，购票与退票在事务提交后失效对应线路日期缓存</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2L10 6L2 10" fill="none" stroke="#116149" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#172033" flood-opacity="0.08"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="70" y="152" width="155" height="106" rx="14" fill="#F0F7F4" stroke="#B8DCCF"/>
    <circle cx="105" cy="184" r="15" fill="#116149"/>
    <path d="M98 184h14M105 177v14" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
    <text x="98" y="216" fill="#172033" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="700">查询请求</text>
    <text x="98" y="239" fill="#667085" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13">from + to + date</text>
  </g>

  <path d="M235 205H304" stroke="#116149" stroke-width="2.4" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="316" y="152" width="178" height="106" rx="14" fill="#FFF8E6" stroke="#F1D38A"/>
    <rect x="350" y="173" width="58" height="36" rx="8" fill="#F2C94C"/>
    <path d="M360 190h38M360 200h24" stroke="#183B56" stroke-width="2" stroke-linecap="round"/>
    <text x="350" y="216" fill="#172033" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="700">TTL 缓存</text>
    <text x="350" y="239" fill="#667085" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13">命中直接返回副本</text>
  </g>

  <path d="M505 180H580" stroke="#116149" stroke-width="2.4" marker-end="url(#arrow)"/>
  <text x="520" y="164" fill="#116149" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13">miss</text>

  <g filter="url(#shadow)">
    <rect x="592" y="125" width="170" height="106" rx="14" fill="#EEF4FF" stroke="#C7D7FE"/>
    <ellipse cx="629" cy="154" rx="27" ry="10" fill="#3B82F6"/>
    <path d="M602 154v31c0 6 12 11 27 11s27-5 27-11v-31" fill="#3B82F6"/>
    <path d="M602 170c0 6 12 11 27 11s27-5 27-11" stroke="#FFFFFF" stroke-width="2"/>
    <text x="620" y="189" fill="#172033" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="700">数据库</text>
    <text x="620" y="212" fill="#667085" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13">查询车次与库存</text>
  </g>

  <path d="M592 246C540 296 424 298 387 262" stroke="#116149" stroke-width="2.4" marker-end="url(#arrow)"/>
  <text x="462" y="302" fill="#116149" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13">写入缓存，设置 TTL</text>

  <g filter="url(#shadow)">
    <rect x="828" y="152" width="195" height="106" rx="14" fill="#FDF2F2" stroke="#F8C7C7"/>
    <rect x="862" y="174" width="46" height="42" rx="8" fill="#B42318"/>
    <path d="M872 191h26M872 202h17" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
    <text x="862" y="216" fill="#172033" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="700">库存变更</text>
    <text x="862" y="239" fill="#667085" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13">购票 / 退票提交后失效</text>
  </g>

  <path d="M827 205H506" stroke="#B42318" stroke-width="2.4" stroke-dasharray="7 7" marker-end="url(#arrow)"/>
  <text x="628" y="191" fill="#B42318" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13">evict route-date key</text>

  <rect x="70" y="306" width="953" height="22" rx="11" fill="#F0F3F7"/>
  <circle cx="146" cy="317" r="5" fill="#116149"/>
  <text x="160" y="322" fill="#485467" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13">命中：降低数据库压力</text>
  <circle cx="348" cy="317" r="5" fill="#3B82F6"/>
  <text x="362" y="322" fill="#485467" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13">未命中：回源查询后写缓存</text>
  <circle cx="608" cy="317" r="5" fill="#B42318"/>
  <text x="622" y="322" fill="#485467" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13">库存变更：事务提交后清理，减少脏读窗口</text>
</svg>
