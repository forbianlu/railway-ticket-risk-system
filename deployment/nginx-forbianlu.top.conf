upstream railway_backend {
    server 127.0.0.1:8080;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name forbianlu.top;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name forbianlu.top;

    root /opt/railway/frontend;
    index index.html;

    ssl_certificate /etc/nginx/ssl/forbianlu.top/forbianlu.top.pem;
    ssl_certificate_key /etc/nginx/ssl/forbianlu.top/forbianlu.top.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 20m;
    client_body_timeout 60s;
    keepalive_timeout 65s;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location = / {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files /index.html =404;
    }

    location = /passenger {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files /passenger.html =404;
    }

    location = /admin {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files /admin.html =404;
    }

    location = /index.html {
        return 301 /;
    }

    location = /passenger.html {
        return 301 /passenger;
    }

    location = /admin.html {
        return 301 /admin;
    }

    location /api/ {
        add_header Cache-Control "no-store" always;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_pass http://railway_backend;
    }

    location ~* ^/(?:h2-console|swagger-ui|v3/api-docs|webjars)(?:/|$) {
        return 404;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }

    location ~* /(deployment|secrets|backups|logs)/ {
        deny all;
    }

    location ~* \.html$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    location ~* \.(?:css|js|png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }
}
