services:
  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: railway_ticket
      MYSQL_USER: railway
      MYSQL_PASSWORD: railway123
      MYSQL_ROOT_PASSWORD: root123
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/railway_ticket?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Hong_Kong
      SPRING_DATASOURCE_USERNAME: railway
      SPRING_DATASOURCE_PASSWORD: railway123
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-data:
