server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: railway-ticket-risk-system
  datasource:
    url: jdbc:h2:mem:railway;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    time-zone: Asia/Hong_Kong
  redis:
    host: localhost
    port: 6379
    timeout: 2s
  data:
    redis:
      repositories:
        enabled: false

logging:
  level:
    org.hibernate.SQL: warn

auth:
  token:
    secret: railway-ticket-risk-demo-secret

security:
  jwt:
    secret: ${JWT_SECRET:railway-ticket-risk-demo-jwt-secret-change-me-please}
    expire-seconds: ${JWT_EXPIRE_SECONDS:28800}

railway:
  demo-data:
    enabled: true
  order:
    close-expired-delay-ms: 60000
  cache:
    train-search:
      enabled: true
      mode: local
      ttl-seconds: 30
      max-entries: 256
  rate-limit:
    enabled: true
    mode: local
    local-fallback-enabled: true
    rules:
      train-search:
        limit: 60
        window-seconds: 60
      order-create:
        limit: 10
        window-seconds: 60
      payment-callback:
        limit: 30
        window-seconds: 60
      risk-handle:
        limit: 30
        window-seconds: 60
  payment:
    callback-secret: ${PAYMENT_CALLBACK_SECRET:demo-payment-callback-secret}
    signature-enabled: true
    timestamp-tolerance-seconds: 300
  refund:
    callback-secret: ${REFUND_CALLBACK_SECRET:demo-refund-callback-secret}
    signature-enabled: true
    timestamp-tolerance-seconds: 300

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/railway_ticket_risk?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Hong_Kong}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${SPRING_DATASOURCE_USERNAME:railway}
    password: ${SPRING_DATASOURCE_PASSWORD:railway_demo}
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: update
  redis:
    host: ${SPRING_REDIS_HOST:redis}
    port: ${SPRING_REDIS_PORT:6379}
    timeout: ${SPRING_REDIS_TIMEOUT:2s}

railway:
  cache:
    train-search:
      mode: redis
      ttl-seconds: ${TRAIN_SEARCH_CACHE_TTL_SECONDS:30}
  rate-limit:
    mode: redis
    local-fallback-enabled: true
