server:
  port: 8080

spring:
  application:
    name: railway-ticket-risk-system
  datasource:
    url: jdbc:h2:mem:railway;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    time-zone: Asia/Hong_Kong

logging:
  level:
    org.hibernate.SQL: warn

auth:
  token:
    secret: railway-ticket-risk-demo-secret

security:
  jwt:
    secret: railway-ticket-risk-demo-jwt-secret-change-me-please
    expire-seconds: 28800

railway:
  order:
    close-expired-delay-ms: 60000
  cache:
    train-search:
      enabled: true
      ttl-seconds: 30
      max-entries: 256
